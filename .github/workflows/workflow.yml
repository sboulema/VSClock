name: VSClock

on:
  push:
    branches:
      - main
      - 'feature/**'

env:
  version: '1.0.${{ github.run_number }}'
  dotnetVersion: '8'
  repoUrl: ${{ github.server_url }}/${{ github.repository }}
  vsixPath: src/bin/Release/net472/VSClock.vsix
  vsixManifestPath: ${{ github.workspace }}/src/source.extension.vsixmanifest

jobs:
  build:
    name: 🛠️ Build
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: ${{ env.dotnetVersion }}.x

      - name: Restore/Build/Test
        run: dotnet test

      - name: Update Vsix Manifest Version
        id: vsix_version
        uses: timheuer/vsix-version-stamp@v2
        with:
          version-number: ${{ env.version }}
          manifest-file: ${{ env.vsixManifestPath }}

      - name: Build VSIX
        run: dotnet publish src -p:Version=${{ env.version }} -c Release

      - name: Publish Build Artifacts
        uses: actions/upload-artifact@v7
        with:
          name: VSClock
          path: |
            ${{ github.workspace }}/${{ env.vsixPath }}
            publish-manifest.json
            README.md

  release:
    if: github.ref_name == 'main'
    name: 🚚 Release
    needs: build
    runs-on: windows-latest
    environment: Release
    permissions:
        contents: write
    steps:
      - name: Download artifact
        uses: actions/download-artifact@v8
        with:
          name: VSClock

      - name: Tag release
        id: tag_release
        uses: mathieudutour/github-tag-action@v6.2
        with:
          custom_tag: '${{ env.version }}'
          github_token: ${{ secrets.GITHUB_TOKEN }}

      - name: Create a GitHub release
        uses: ncipollo/release-action@v1.21.0
        with:
          tag: ${{ steps.tag_release.outputs.new_tag }}
          name: ${{ steps.tag_release.outputs.new_tag }}
          body: ${{ steps.tag_release.outputs.changelog }}
          artifacts: ${{ github.workspace }}/${{ env.vsixPath }}
          skipIfReleaseExists: true

  publish:
    if: github.ref_name == 'main'
    name: 🚀 Publish
    needs: release
    runs-on: windows-latest
    permissions:
        contents: write
    steps:
      - name: Download artifact
        uses: actions/download-artifact@v8

      - name: Publish to Marketplace
        run: >
          & 'C:/Program Files/Microsoft Visual Studio/2022/Enterprise/VSSDK/VisualStudioIntegration/Tools/Bin/VsixPublisher.exe'
          publish
          -payload ${{ github.workspace }}/${{ env.vsixPath }}
          -publishManifest publish-manifest.json
          -personalAccessToken ${{ secrets.VS_PUBLISHER_ACCESS_TOKEN }}

      - name: Publish to Open VSIX Gallery
        uses: timheuer/openvsixpublish@v1
        with:
          vsix-file: ${{ env.vsixPath }}